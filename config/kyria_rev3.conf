# ─── Save configuration between power cycles ─────────────────────────────────
CONFIG_SETTINGS=y

# ─── Encoders ────────────────────────────────────────────────────────────────
# Uncomment to add rotary encoder support.
# CONFIG_EC11=y
# CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# ─── Custom display module ────────────────────────────────────────────────────
# Enables the custom OLED display (display_module/). Replaces ZMK's default
# widgets with a full custom layout: info column (left half) and pet area
# (right half). Requires CONFIG_ZMK_DISPLAY=y.
CONFIG_ZMK_DISPLAY=y
CONFIG_CUSTOM_DISPLAY=y

# Start with the custom display active on boot. Comment out to start with
# ZMK's stock display instead; use the &display_toggle key to switch at runtime.
CONFIG_CUSTOM_DISPLAY_DEFAULT_ON=y

# ─── LVGL / display infrastructure ───────────────────────────────────────────
# LVGL heap size in bytes. 16 KB is the minimum for our custom layout with
# multiple label and image objects. Increase if you add more LVGL widgets and
# see allocation failures in the log.
CONFIG_LV_Z_MEM_POOL_SIZE=16384

# Dedicated work queue and thread for LVGL calls. Required — the custom display
# module submits all LVGL updates to zmk_display_work_q(). Do not disable.
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y

# Stack size for the dedicated display thread in bytes. 4 KB is sufficient for
# the current layout. Increase if you hit stack overflows after adding features.
CONFIG_ZMK_DISPLAY_DEDICATED_THREAD_STACK_SIZE=4096

# ─── Battery ─────────────────────────────────────────────────────────────────
# Live battery reporting and cross-half proxying over BLE split.
# All three are required to show the peripheral half's battery % on the central.
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# Expose battery level as a percentage (0–100) rather than a coarse icon level.
CONFIG_ZMK_WIDGET_BATTERY_STATUS_SHOW_PERCENTAGE=y

# ─── RGB underglow ────────────────────────────────────────────────────────────
# Uncomment to enable RGB underglow (hardware not present on this build).
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y
